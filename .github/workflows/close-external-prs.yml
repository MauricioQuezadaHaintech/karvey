name: Close external PRs

# Karvey no acepta contribuciones vía PR. Este workflow cierra
# automáticamente cualquier PR de quien no sea owner/colaborador,
# redirigiendo a Discussions. Solo afecta a ESTE repo.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    if: ${{ !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
    steps:
      - name: Comment and close
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: [
                "¡Gracias por tu interés en **Karvey**! 🙌",
                "",
                "Este repositorio **no acepta contribuciones vía Pull Request**.",
                "Karvey es un método propiedad de **HainTech** (marca registrada).",
                "",
                "Puedes **hacer fork y usarlo** libremente bajo la licencia Apache-2.0,",
                "pero las modificaciones al repo original están cerradas.",
                "",
                "Si quieres comentar, sugerir o preguntar, usa **Discussions**:",
                `https://github.com/${context.repo.owner}/${context.repo.repo}/discussions`,
                "",
                "_Este PR se cierra automáticamente._"
              ].join("\n")
            });
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              state: "closed"
            });
